services:
  - type: web
    name: smartbank
    env: python
    nodeVersion: "20"
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: PATH="/usr/local/bin:$PATH" && alembic upgrade head && python3 -m uvicorn app.main:app --host 0.0.0.0 --port "${PORT:-10000}"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        value: SmartBank
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://smartbank.onrender.com