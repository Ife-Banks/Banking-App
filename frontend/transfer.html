<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/app/favicon.svg"/>
  <title>SmartBank — Transfer</title>
  <link rel="stylesheet" href="/app/js/tailwind.css"/>
  <script src="/app/js/htmx.js"></script>
  <script src="/app/js/json-enc.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#E8EAF3] text-[#2D2B3D] antialiased">

<nav class="bg-[#F5F6FB] border-b border-[#E0DFE8] px-8 py-5 flex justify-between items-center sticky top-0 z-50 shadow-[0_4px_12px_#d0d1da]">
  <a href="/app/dashboard.html" class="text-[#2D2B3D] font-black text-lg tracking-widest uppercase">SmartBank</a>
  <button onclick="logout()" class="text-xs font-semibold uppercase tracking-wider text-[#8B8794] hover:text-[#6C63FF] transition-colors">Sign out</button>
</nav>

<main class="max-w-md mx-auto px-4 py-10 space-y-6">
  <a href="/app/dashboard.html" class="inline-flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-[#8B8794] hover:text-[#6C63FF] transition-colors mb-2">
    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
    Back to dashboard
  </a>

  <div id="step-setup-pin" class="hidden bg-[#F5F6FB] rounded-[32px] p-7 shadow-[10px_10px_24px_#c8c9d1,-10px_-10px_24px_#ffffff]">
    <h2 class="text-xs font-bold uppercase tracking-widest text-[#6C63FF] mb-1.5">Set transfer PIN first</h2>
    <p class="text-[11px] text-[#8B8794] leading-relaxed font-light mb-5">Create a 4-digit PIN in your profile before sending money.</p>
    <a href="/app/profile.html"
      class="block w-full text-center bg-[#6C63FF] hover:bg-[#5A52E0] text-white font-bold text-xs uppercase tracking-widest py-3.5 rounded-2xl transition-all shadow-[6px_6px_14px_#c8c9d1,-6px_-6px_14px_#ffffff] active:shadow-[inset_4px_4px_8px_#5248d9,inset_-4px_-4px_8px_#867eff]">
      Go to Profile
    </a>
  </div>

  <div id="step-form" class="bg-[#F5F6FB] rounded-[32px] p-8 shadow-[10px_10px_24px_#c8c9d1,-10px_-10px_24px_#ffffff] transition-all duration-300">
    <div class="mb-6">
      <h2 class="text-xs font-bold uppercase tracking-widest text-[#6C63FF]">Send money</h2>
    </div>
    
    <div id="transfer-error" class="hidden mb-5 p-4 bg-[#FFF0F0] rounded-2xl text-[#E05050] text-xs font-semibold tracking-wide shadow-[inset_3px_3px_6px_#d8d4dd,inset_-3px_-3px_6px_#ffffff]"></div>

    <form id="transfer-form" class="space-y-4" hx-post="/transfers/internal" hx-ext="json-enc"
      hx-target="#transfer-error" hx-swap="none"
      hx-on::config-request="prepareTransferRequest(event)"
      hx-on::after-request="handleTransferResponse(event)">
      
      <div class="space-y-1.5">
        <label class="block text-[10px] font-bold uppercase tracking-wider text-[#8B8794]">Recipient account number</label>
        <input id="t-account" name="receiver_account_number" type="text" maxlength="10" placeholder="30XXXXXXXX"
          class="w-full px-4 py-3.5 bg-[#F5F6FB] rounded-2xl text-xs font-medium text-[#2D2B3D] placeholder-[#B8B4C4] focus:outline-none transition-all shadow-[inset_4px_4px_8px_#d8d4dd,inset_-4px_-4px_8px_#ffffff] focus:shadow-[inset_6px_6px_12px_#c8c9d1,inset_-6px_-6px_12px_#ffffff]"/>
      </div>
      
      <div class="space-y-1.5">
        <label class="block text-[10px] font-bold uppercase tracking-wider text-[#8B8794]">Amount (&#x20A6;)</label>
        <input id="t-amount" name="amount" type="number" min="1" step="0.01" placeholder="0.00"
          class="w-full px-4 py-3.5 bg-[#F5F6FB] rounded-2xl text-xs font-medium text-[#2D2B3D] placeholder-[#B8B4C4] focus:outline-none transition-all shadow-[inset_4px_4px_8px_#d8d4dd,inset_-4px_-4px_8px_#ffffff] focus:shadow-[inset_6px_6px_12px_#c8c9d1,inset_-6px_-6px_12px_#ffffff]"/>
      </div>
      
      <div class="space-y-1.5">
        <label class="block text-[10px] font-bold uppercase tracking-wider text-[#8B8794]">Narration <span class="text-[#B8B4C4] lowercase font-light">(optional)</span></label>
        <input id="t-narration" name="narration" type="text" placeholder="e.g. Rent payment"
          class="w-full px-4 py-3.5 bg-[#F5F6FB] rounded-2xl text-xs font-medium text-[#2D2B3D] placeholder-[#B8B4C4] focus:outline-none transition-all shadow-[inset_4px_4px_8px_#d8d4dd,inset_-4px_-4px_8px_#ffffff] focus:shadow-[inset_6px_6px_12px_#c8c9d1,inset_-6px_-6px_12px_#ffffff]"/>
      </div>
      
      <div class="space-y-1.5">
        <label class="block text-[10px] font-bold uppercase tracking-wider text-[#8B8794]">Transfer PIN</label>
        <input id="t-pin" name="transfer_pin" type="password" inputmode="numeric" maxlength="4" placeholder="&#xb7;&#xb7;&#xb7;&#xb7;"
          class="w-full px-4 py-3.5 bg-[#F5F6FB] rounded-2xl text-base font-bold font-mono tracking-[0.5em] text-center text-[#2D2B3D] placeholder-[#D0CDDA] focus:outline-none transition-all shadow-[inset_4px_4px_8px_#d8d4dd,inset_-4px_-4px_8px_#ffffff] focus:shadow-[inset_6px_6px_12px_#c8c9d1,inset_-6px_-6px_12px_#ffffff]"/>
        <p class="text-[10px] text-[#8B8794] font-light pt-0.5">
          <a href="/app/profile.html" class="text-[#6C63FF] font-semibold hover:underline">Change PIN in Profile</a>
        </p>
      </div>
      
      <input id="t-idempotency" name="idempotency_key" type="hidden" />
      
      <button type="submit"
        class="w-full bg-[#6C63FF] hover:bg-[#5A52E0] text-white font-bold text-xs uppercase tracking-widest py-4 rounded-2xl transition-all shadow-[6px_6px_14px_#c8c9d1,-6px_-6px_14px_#ffffff] active:shadow-[inset_4px_4px_8px_#5248d9,inset_-4px_-4px_8px_#867eff] mt-2">
        Send money
      </button>
    </form>
  </div>

  <div id="step-success" class="hidden bg-[#F5F6FB] rounded-[32px] p-8 text-center shadow-[10px_10px_24px_#c8c9d1,-10px_-10px_24px_#ffffff] transition-all duration-300">
    <div class="w-14 h-14 rounded-2xl bg-[#10B981] flex items-center justify-center text-white mx-auto mb-5 shadow-[4px_4px_10px_#c8c9d1,-4px_-4px_10px_#ffffff]">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h2 class="text-sm font-bold uppercase tracking-widest text-[#2D2B3D] mb-1">Transfer successful</h2>
    <p id="success-detail" class="text-xs text-[#2D2B3D] font-bold tracking-wide mt-3 mb-1"></p>
    <p id="success-ref" class="text-[10px] font-mono text-[#8B8794] mb-6"></p>
    
    <div class="space-y-3">
      <button type="button" id="success-receipt-btn" onclick="downloadReceipt(lastTxnReference)"
        class="w-full bg-[#F5F6FB] hover:bg-[#EEEFF5] text-[#2D2B3D] border border-[#E0DFE8] font-bold text-xs uppercase tracking-widest py-3.5 rounded-2xl transition-all shadow-[4px_4px_10px_#c8c9d1,-4px_-4px_10px_#ffffff] active:shadow-[inset_3px_3px_6px_#d8d4dd,inset_-3px_-3px_6px_#ffffff]">
        Download receipt
      </button>
      <a href="/app/dashboard.html"
        class="block w-full bg-[#6C63FF] hover:bg-[#5A52E0] text-white font-bold text-xs uppercase tracking-widest py-3.5 rounded-2xl transition-all shadow-[6px_6px_14px_#c8c9d1,-6px_-6px_14px_#ffffff] active:shadow-[inset_4px_4px_8px_#5248d9,inset_-4px_-4px_8px_#867eff] text-center">
        Back to dashboard
      </a>
    </div>
  </div>
</main>

<script src="/app/js/auth.js"></script>
<script>
  requireAuth();

  let lastRecipient = "";
  let lastTxnReference = "";

  async function checkPinStatus() {
    const res = await apiFetch("/accounts/transfer-pin/status");
    if (!res?.ok) return;
    const data = await res.json();
    if (!data.has_transfer_pin) {
      document.getElementById("step-setup-pin").classList.remove("hidden");
      document.getElementById("step-form").classList.add("hidden");
    }
  }

  function prepareTransferRequest(event) {
    const account = document.getElementById("t-account").value.trim();
    const amount = parseFloat(document.getElementById("t-amount").value);
    const narration = document.getElementById("t-narration").value.trim() || "Transfer";
    const pin = document.getElementById("t-pin").value.trim();
    const errorEl = document.getElementById("transfer-error");
    errorEl.classList.add("hidden");

    if (!account || !amount || amount <= 0 || !pin || pin.length !== 4) {
      event.preventDefault();
      errorEl.textContent = "Enter recipient, amount, and your 4-digit transfer PIN.";
      errorEl.classList.remove("hidden");
      return;
    }

    lastRecipient = account;
    const idempotencyKey = `txn-${Date.now()}-${Math.random().toString(36).slice(2)}`;
    document.getElementById("t-idempotency").value = idempotencyKey;

    event.detail.parameters.receiver_account_number = account;
    event.detail.parameters.amount = amount;
    event.detail.parameters.narration = narration;
    event.detail.parameters.transfer_pin = pin;
    event.detail.parameters.idempotency_key = idempotencyKey;
  }

  function handleTransferResponse(event) {
    const response = event.detail.xhr;
    const data = JSON.parse(response.responseText || "{}");

    if (response.status >= 400) {
      const el = document.getElementById("transfer-error");
      el.textContent = data.detail || "Transfer failed";
      el.classList.remove("hidden");
      return;
    }

    lastTxnReference = data.reference;
    document.getElementById("success-detail").textContent =
      `\u20A6${Number(data.amount).toLocaleString("en-NG", { minimumFractionDigits: 2 })} sent to ${lastRecipient}`;
    document.getElementById("success-ref").textContent = `Reference: ${data.reference}`;
    document.getElementById("step-form").classList.add("hidden");
    document.getElementById("step-success").classList.remove("hidden");
  }

  checkPinStatus();
</script>
</body>
</html>
